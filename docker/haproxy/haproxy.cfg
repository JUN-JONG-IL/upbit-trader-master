# ==============================================================================
# HAProxy 설정 (v9.0 — Redis Cluster + PostgreSQL 읽기/쓰기 부하 분산)
# ==============================================================================

global
    maxconn 4096
    log     stdout format raw local0

defaults
    log         global
    mode        tcp
    option      tcplog
    timeout     connect 5000ms
    timeout     client  50000ms
    timeout     server  50000ms

# ------------------------------------------------------------------------------
# Redis Cluster 로드 밸런싱 (포트 6379 → redis-node-1/2/3)
# ------------------------------------------------------------------------------
frontend redis_frontend
    bind *:6379
    default_backend redis_cluster

backend redis_cluster
    balance roundrobin
    server redis1 redis-node-1:7001 check
    server redis2 redis-node-2:7002 check
    server redis3 redis-node-3:7003 check

# ------------------------------------------------------------------------------
# PostgreSQL 읽기 전용 엔드포인트 (Replica Round-Robin, 포트 5434)
# ------------------------------------------------------------------------------
frontend postgres_read_frontend
    bind *:5434
    default_backend postgres_read

backend postgres_read
    balance leastconn
    option  tcp-check
    server  postgres-replica postgres-replica:5432 check inter 5s rise 2 fall 3

# ------------------------------------------------------------------------------
# PostgreSQL 쓰기 전용 엔드포인트 (Primary, 포트 5435)
# ------------------------------------------------------------------------------
frontend postgres_write_frontend
    bind *:5435
    default_backend postgres_write

backend postgres_write
    server postgres-primary postgres-primary:5432 check inter 5s rise 2 fall 3

# ------------------------------------------------------------------------------
# HAProxy 통계 대시보드 (포트 8404)
# ------------------------------------------------------------------------------
frontend stats
    bind *:8404
    mode    http
    stats   enable
    stats   uri /stats
    stats   refresh 10s
    stats   show-legends
    stats   show-node
