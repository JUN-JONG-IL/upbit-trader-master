[databases]
upbit_trader = host=upbit-timescaledb port=5432 dbname=upbit_trader user=postgres password=postgres

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
default_pool_size = 20
max_client_conn = 200
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1