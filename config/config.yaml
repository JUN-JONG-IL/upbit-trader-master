# =============================================================================
# 기관급 트레이딩 시스템 - 앱 운영 통합 설정 (config.yaml)
# 버전: v1.0
# 우선순위: 환경 변수 > 이 파일 > 코드 내 기본값
#
# ⚠️ 심볼 리미트 관련 설정은 반드시 이 파일에서만 변경하세요.
#    코드 내 하드코딩된 LIMIT, 300 등은 모두 이 파일을 참조합니다.
# =============================================================================

websocket:
  upbit:
    # 업비트 WebSocket 최대 구독 심볼 수
    # - 업비트 공식 단일 연결 구독 제한: 100개
    # - 100개 초과 시 내부적으로 다중 연결로 분산 처리
    # - 현재 업비트 상장 종목: 약 245개 (KRW 마켓 기준, 2026년 5월 기준)
    # - 권장값: 300 (전체 종목 + 여유분)
    # - 환경변수 UPBIT_WS_MAX_SUBSCRIBE 로 오버라이드 가능
    max_subscribe: 300

  reconnect_delay_initial: 1
  reconnect_delay_max: 60
  ping_interval: 60

ui:
  db_viewer:
    # DB 심볼 목록 조회 최대 개수
    # - TimescaleDB candles 테이블 GROUP BY symbol 쿼리에 사용
    # - 이 값이 낮으면 드롭다운에 일부 심볼만 표시됨
    #   (예: 100으로 설정 시 알파벳 순 KRW-AXL 까지만 표시)
    # - 업비트 KRW 마켓 전체 ~245개를 커버하려면 500 이상 권장
    # - 국내주식·해외주식·암호화폐(다거래소) 전종목 커버를 위해 10,000으로 확장
    symbol_query_limit: 10000

    # 심볼 콤보박스 최대 표시 개수 (0 = 제한 없음)
    combo_max_display: 0

  auto_refresh_interval: 3

collection:
  # 업비트 REST /v1/market/all 조회 최대 심볼 수
  # websocket.upbit.max_subscribe 와 동일하게 유지 권장
  max_markets: 300
  batch_size: 1000
  flush_interval: 5

db_management:
  # 삭제 전 확인 팝업 표시 여부 (true 강력 권장)
  confirm_before_delete: true
  # 대용량 삭제 시 진행률 표시 임계값 (건수)
  progress_dialog_threshold: 10000
