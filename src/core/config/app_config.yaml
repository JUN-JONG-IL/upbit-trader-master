# Upbit Trader v3.0 Application Configuration
app:
  name: upbit-trader
  version: "3.0"
  debug: false

server:
  host: "0.0.0.0"
  port: 8000

database:
  timescale:
    host: "localhost"
    port: 5432
    name: "upbit_trader"
  redis:
    host: "localhost"
    port: 6379
  mongo:
    host: "localhost"
    port: 27017

trading:
  default_currency: "KRW"
  max_positions: 10

logging:
  level: "INFO"
  dir: "logs/"
