# ==============================================================================
# HAProxy 설정 (v9.0 — PostgreSQL 읽기 부하 분산)
#
# frontend postgres_read  : 포트 5000 → Replica 2대에 Round-Robin
# stats 페이지            : 포트 8404 (http://localhost:8404/stats)
# ==============================================================================

global
    log         stdout format raw local0
    maxconn     4096

defaults
    log         global
    mode        tcp
    option      tcplog
    timeout     connect 5s
    timeout     client  30s
    timeout     server  30s
    retries     3

# ------------------------------------------------------------------------------
# 읽기 전용 엔드포인트 (Replica Round-Robin)
# ------------------------------------------------------------------------------
frontend postgres_read
    bind *:5000
    default_backend postgres_replicas

backend postgres_replicas
    balance         roundrobin
    option          tcp-check
    server replica1 postgres-replica-1:5432 check inter 5s rise 2 fall 3
    server replica2 postgres-replica-2:5432 check inter 5s rise 2 fall 3

# ------------------------------------------------------------------------------
# 쓰기 전용 엔드포인트 (Primary 단독)
# ------------------------------------------------------------------------------
frontend postgres_write
    bind *:5001
    default_backend postgres_primary

backend postgres_primary
    server primary postgres-primary:5432 check inter 5s rise 2 fall 3

# ------------------------------------------------------------------------------
# HAProxy 통계 대시보드
# ------------------------------------------------------------------------------
frontend stats
    bind *:8404
    mode    http
    stats   enable
    stats   uri /stats
    stats   refresh 10s
    stats   show-legends
    stats   show-node
